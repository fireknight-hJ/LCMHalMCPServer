output.elf:
  rules: semu_rule.txt
  enable_native: false
  emulate_mode: emulate
  loop_whitelist:
  - memset
  - memcpy
  - memmove
  - FillZerobss
  - LoopFillZerobss
  - CopyDataInit
  - LoopCopyDataInit
  - Zero_Init
  - Reset_Handler
  - SystemInit
  handlers:
    Delay: do_return
    HAL_Delay: do_return
    wait: do_return
    wait_us: do_return
    HAL_BE_ENET_ReadFrame: fuzzemu.handlers.common.hal_read_frame
    HAL_BE_In: fuzzemu.handlers.common.hal_in
    HAL_BE_Out: fuzzemu.handlers.common.hal_out
    HAL_BE_return_0: fuzzemu.handlers.common.return_zero
    HAL_BE_return_1: fuzzemu.handlers.common.return_true
    HAL_BE_Block_Read: fuzzemu.handlers.common.hal_block_in
    HAL_BE_Block_Write: fuzzemu.handlers.common.hal_block_out
    puts: do_return
    fflush: do_return
    DP83848_Init: do_return
    stm32_putc: do_return
    rt_thread_mdelay: do_return
    DelayLoop: do_return
    SDK_DelayAtLeastUs: do_return
    LPUART_WriteBlocking: do_return
    ENET_SetSMI: do_return
    DP83848_GetLinkState: fuzzemu.handlers.common.return_2
    PHY_GetLinkStatus: fuzzemu.handlers.common.return_2
    PHY_GetLinkSpeedDuplex: fuzzemu.handlers.common.return_2
    HAL_RCC_ClockConfig: fuzzemu.handlers.common.return_zero
    HAL_ETH_ReadPHYRegister: fuzzemu.handlers.common.return_zero
    ethernetif_phy_init: fuzzemu.handlers.common.return_zero
    PHY_Init: fuzzemu.handlers.common.return_zero
    ENET_MDIORead: fuzzemu.handlers.common.return_phy_id
  mmio_funcs:
  - BOARD_BootClockRUN
  - BOARD_InitPins
  - CLOCK_DeinitArmPll
  - CLOCK_DeinitAudioPll
  - CLOCK_DeinitEnetPll
  - CLOCK_DeinitExternalClk
  - CLOCK_DeinitRcOsc24M
  - CLOCK_DeinitSysPfd
  - CLOCK_DeinitSysPll
  - CLOCK_DeinitUsb1Pfd
  - CLOCK_DeinitUsb1Pll
  - CLOCK_DeinitUsb2Pll
  - CLOCK_DeinitVideoPll
  - CLOCK_DisableUsbhs0PhyPllClock
  - CLOCK_DisableUsbhs1PhyPllClock
  - CLOCK_EnableUsbhs0Clock
  - CLOCK_EnableUsbhs0PhyPllClock
  - CLOCK_EnableUsbhs1Clock
  - CLOCK_EnableUsbhs1PhyPllClock
  - CLOCK_GetAhbFreq
  - CLOCK_GetFreq
  - CLOCK_GetIpgFreq
  - CLOCK_GetPerClkFreq
  - CLOCK_GetPeriphClkFreq
  - CLOCK_GetPllFreq
  - CLOCK_GetSemcFreq
  - CLOCK_GetSysPfdFreq
  - CLOCK_GetUsb1PfdFreq
  - CLOCK_InitArmPll
  - CLOCK_InitAudioPll
  - CLOCK_InitEnetPll
  - CLOCK_InitExternalClk
  - CLOCK_InitRcOsc24M
  - CLOCK_InitSysPfd
  - CLOCK_InitSysPll
  - CLOCK_InitUsb1Pfd
  - CLOCK_InitUsb1Pll
  - CLOCK_InitUsb2Pll
  - CLOCK_InitVideoPll
  - CLOCK_SwitchOsc
  - DMAMUX_Deinit
  - DMAMUX_Init
  - EDMA_AbortTransfer
  - EDMA_ClearChannelStatusFlags
  - EDMA_CreateHandle
  - EDMA_Deinit
  - EDMA_DisableChannelInterrupts
  - EDMA_EnableChannelInterrupts
  - EDMA_GetChannelStatusFlags
  - EDMA_GetRemainingMajorLoopCount
  - EDMA_HandleIRQ
  - EDMA_Init
  - EDMA_InstallTCD
  - EDMA_ResetChannel
  - EDMA_SetBandWidth
  - EDMA_SetChannelLink
  - EDMA_SetMinorOffsetConfig
  - EDMA_SetModulo
  - EDMA_SetTransferConfig
  - EDMA_StartTransfer
  - EDMA_StopTransfer
  - EDMA_SubmitTransfer
  - GPIO_PinInit
  - GetUartSrcFreq
  - LPUART_Deinit
  - LPUART_Init
  - SystemCoreClockUpdate
  - SystemInit
  - XBARA_Deinit
  - XBARA_Init
  - XBARB_Deinit
  - XBARB_Init
  - imxrt_pin_mode
