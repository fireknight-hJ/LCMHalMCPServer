output.elf:
  rules: semu_rule.txt
  enable_native: false
  emulate_mode: emulate
  loop_whitelist:
  - memset
  - memcpy
  - memmove
  - FillZerobss
  - LoopFillZerobss
  - CopyDataInit
  - LoopCopyDataInit
  - Zero_Init
  - Reset_Handler
  - SystemInit
  handlers:
    Delay: do_return
    HAL_Delay: do_return
    wait: do_return
    wait_us: do_return
    HAL_BE_ENET_ReadFrame: fuzzemu.handlers.common.hal_read_frame
    HAL_BE_In: fuzzemu.handlers.common.hal_in
    HAL_BE_Out: fuzzemu.handlers.common.hal_out
    HAL_BE_return_0: fuzzemu.handlers.common.return_zero
    HAL_BE_return_1: fuzzemu.handlers.common.return_true
    HAL_BE_Block_Read: fuzzemu.handlers.common.hal_block_in
    HAL_BE_Block_Write: fuzzemu.handlers.common.hal_block_out
    puts: do_return
    fflush: do_return
    DP83848_Init: do_return
    stm32_putc: do_return
    rt_thread_mdelay: do_return
    DelayLoop: do_return
    SDK_DelayAtLeastUs: do_return
    LPUART_WriteBlocking: do_return
    ENET_SetSMI: do_return
    DP83848_GetLinkState: fuzzemu.handlers.common.return_2
    PHY_GetLinkStatus: fuzzemu.handlers.common.return_2
    PHY_GetLinkSpeedDuplex: fuzzemu.handlers.common.return_2
    HAL_RCC_ClockConfig: fuzzemu.handlers.common.return_zero
    HAL_ETH_ReadPHYRegister: fuzzemu.handlers.common.return_zero
    ethernetif_phy_init: fuzzemu.handlers.common.return_zero
    PHY_Init: fuzzemu.handlers.common.return_zero
    ENET_MDIORead: fuzzemu.handlers.common.return_phy_id
  mmio_funcs:
  - HAL_ADC_MspDeInit
  - HAL_ADC_MspInit
  - HAL_DMAEx_MultiBufferStart_IT
  - HAL_DeInit
  - HAL_GPIO_DeInit
  - HAL_GPIO_EXTI_IRQHandler
  - HAL_GPIO_Init
  - HAL_GPIO_LockPin
  - HAL_GPIO_ReadPin
  - HAL_GPIO_TogglePin
  - HAL_GPIO_WritePin
  - HAL_HalfDuplex_Init
  - HAL_Init
  - HAL_LIN_Init
  - HAL_MultiProcessor_Init
  - HAL_PWREx_ControlVoltageScaling
  - HAL_PWREx_DisableBkUpReg
  - HAL_PWREx_EnableBkUpReg
  - HAL_PWREx_GetVoltageRange
  - HAL_PWR_ConfigPVD
  - HAL_PWR_DeInit
  - HAL_PWR_DisableBkUpAccess
  - HAL_PWR_DisableWakeUpPin
  - HAL_PWR_EnableBkUpAccess
  - HAL_PWR_EnableWakeUpPin
  - HAL_PWR_EnterSTANDBYMode
  - HAL_PWR_EnterSTOPMode
  - HAL_PWR_PVD_IRQHandler
  - HAL_RCCEx_DisablePLLI2S
  - HAL_RCCEx_EnablePLLI2S
  - HAL_RCCEx_GetPeriphCLKConfig
  - HAL_RCCEx_GetPeriphCLKFreq
  - HAL_RCCEx_PeriphCLKConfig
  - HAL_RCC_ClockConfig
  - HAL_RCC_GetClockConfig
  - HAL_RCC_GetPCLK1Freq
  - HAL_RCC_GetPCLK2Freq
  - HAL_RCC_MCOConfig
  - HAL_RCC_NMI_IRQHandler
  - HAL_SPI_DeInit
  - HAL_SPI_Init
  - HAL_TIM_Base_MspDeInit
  - HAL_TIM_Base_MspInit
  - HAL_TIM_MspPostInit
  - HAL_UART_DeInit
  - HAL_UART_Init
  - SystemClock_Config
  - SystemCoreClockUpdate
  - rt_hw_pin_init
  - stm32_dma_config
